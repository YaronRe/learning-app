<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לימוד אנגלית לילדים / English for Kids</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&family=Fredoka:wght@400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <div id="login-overlay" class="overlay">
            <div class="login-box">
                <h2>👋 מי משחק? / Who is playing?</h2>
                <div class="input-group">
                    <input type="text" id="username-input" placeholder="הכנס שם / Enter Name" autofocus>
                    <button id="login-btn" class="action-btn primary">התחל / Start</button>
                </div>
                <p id="login-message" class="message"></p>
            </div>
        </div>

        <header>
            <div id="user-bar" class="hidden">
                <span id="user-greeting">שלום, <span id="current-username"></span>!</span>
                <span id="current-mode-title" class="hidden"></span>
                <span id="user-points">⭐ <span id="points-value">0</span></span>
                <button id="logout-btn" class="small-btn">יציאה / Log Out</button>
            </div>
            <h1 id="main-title">🎈 לומדים אנגלית בכיף 🎈</h1>
            <p id="main-subtitle">English is Fun!</p>
        </header>

        <main>
            <div id="category-area" class="menu-area hidden">
                <h2>בחר קטגוריות / Choose Categories</h2>

                <div id="category-grid" class="category-grid">
                    <!-- Categories injected here -->
                </div>
                <p id="category-error-message" class="message error-text hidden">אנא בחר לפחות קטגוריה אחת / Please
                    select at least one category</p>
                <div style="margin-top: 1.5rem;">
                    <button id="continue-to-modes-btn" class="action-btn primary" style="margin: 0 auto;">המשך /
                        Continue</button>
                </div>
            </div>

            <div id="menu-area" class="menu-area hidden">
                <button id="back-to-categories-btn" class="secondary-btn small-btn">⬅️ חזרה לקטגוריות /
                    Categories</button>
                <h2>בחר משחק / Choose a Game</h2>
                <div class="menu-grid">
                    <button class="menu-btn mode-btn" data-mode="type1">
                        <span class="mode-icon">🎧➡️✍️🇮🇱</span>
                        <span class="mode-title-he">שמע אנגלית, כתוב עברית</span>
                        <span class="mode-title-en">Hear English, Type Hebrew</span>
                        <span class="mode-score">⭐ <span id="score-type1">0</span></span>
                    </button>
                    <button class="menu-btn mode-btn" data-mode="type2">
                        <span class="mode-icon">📖🇬🇧➡️✍️🇮🇱</span>
                        <span class="mode-title-he">קרא אנגלית, כתוב עברית</span>
                        <span class="mode-title-en">Read English, Type Hebrew</span>
                        <span class="mode-score">⭐ <span id="score-type2">0</span></span>
                    </button>
                    <button class="menu-btn mode-btn" data-mode="type3">
                        <span class="mode-icon">🎧➡️✍️🇬🇧</span>
                        <span class="mode-title-he">שמע אנגלית, כתוב אנגלית</span>
                        <span class="mode-title-en">Hear English, Type English</span>
                        <span class="mode-score">⭐ <span id="score-type3">0</span></span>
                    </button>
                    <button class="menu-btn mode-btn" data-mode="type4">
                        <span class="mode-icon">📖🇮🇱➡️✍️🇬🇧</span>
                        <span class="mode-title-he">קרא עברית, כתוב אנגלית</span>
                        <span class="mode-title-en">Read Hebrew, Type English</span>
                        <span class="mode-score">⭐ <span id="score-type4">0</span></span>
                    </button>
                    <button class="menu-btn mode-btn" data-mode="type5">
                        <span class="mode-icon">🎧➡️👆🇮🇱</span>
                        <span class="mode-title-he">שמע אנגלית, בחר עברית</span>
                        <span class="mode-title-en">Hear English, Choose Hebrew</span>
                        <span class="mode-score">⭐ <span id="score-type5">0</span></span>
                    </button>
                    <button class="menu-btn mode-btn" data-mode="type6">
                        <span class="mode-icon">📖🇬🇧➡️👆🇮🇱</span>
                        <span class="mode-title-he">קרא אנגלית, בחר עברית</span>
                        <span class="mode-title-en">Read English, Choose Hebrew</span>
                        <span class="mode-score">⭐ <span id="score-type6">0</span></span>
                    </button>
                    <button class="menu-btn mode-btn" data-mode="type7">
                        <span class="mode-icon">🎧➡️👆🇬🇧</span>
                        <span class="mode-title-he">שמע אנגלית, בחר אנגלית</span>
                        <span class="mode-title-en">Hear English, Choose English</span>
                        <span class="mode-score">⭐ <span id="score-type7">0</span></span>
                    </button>
                    <button class="menu-btn mode-btn" data-mode="type8">
                        <span class="mode-icon">📖🇮🇱➡️👆🇬🇧</span>
                        <span class="mode-title-he">קרא עברית, בחר אנגלית</span>
                        <span class="mode-title-en">Read Hebrew, Choose English</span>
                        <span class="mode-score">⭐ <span id="score-type8">0</span></span>
                    </button>
                </div>
            </div>

            <div id="game-area" class="game-area hidden">
                <button id="back-to-menu-btn" class="secondary-btn small-btn">⬅️ חזרה לתפריט / Back</button>
                <div class="card" id="flashcard">
                    <div class="front">
                        <div id="word-stats-display" class="word-stats hidden">⭐ 0/0 (0%)</div>
                        <span id="prompt-display">שלום</span>
                        <button id="play-audio-prompt-btn" class="action-btn hidden" aria-label="שמע את המילה">🔊 שמע /
                            Listen</button>
                    </div>
                </div>

                <div class="controls">
                    <button id="speak-btn" class="action-btn" aria-label="שמע את המילה">🔊 שמע</button>
                    <button id="next-btn" class="action-btn primary hidden">המילה הבאה ➡️</button>
                </div>

                <div class="answer-area">
                    <div class="input-container" id="text-input-container">
                        <input type="text" id="answer-input" placeholder="Type here..." autocomplete="off">
                    </div>

                    <div id="options-container" class="options-container hidden">
                        <!-- Options buttons injected here -->
                    </div>

                    <div class="action-buttons">
                        <button id="check-btn" class="action-btn primary">בדיקה / Check</button>
                        <button id="give-up-btn" class="secondary-btn">גלה לי / Reveal</button>
                    </div>

                    <p id="answer-reveal-display" class="hidden">Hello</p>
                    <div id="feedback-message" class="message"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
